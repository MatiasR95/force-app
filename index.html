<!doctype html>
<html lang="es-AR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/logo/force_emblem.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- `black` (NOT black-translucent): black-translucent makes iOS lay a standalone
         PWA into a viewport that is SHORT by the top safe-area inset and top-anchored,
         so real layout content clips ~top-inset px above the physical bottom (measured
         on iPhone 15 Pro Max: usable viewport 873 vs screen 932). `black` gives the web
         view a correctly-sized viewport that reaches the true bottom, so the bottom nav
         sits flush with readable labels. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <title>FORCE — Mi Rutina</title>
    <script>
      // Self-heal a stale PWA cache. If an app asset (script/style) fails to load
      // — e.g. an old service worker serving a now-missing chunk after a deploy —
      // React never mounts and the in-app error boundary can't run, leaving a
      // blank screen. Detect that, clear the SW + caches, and reload ONCE.
      (function () {
        window.addEventListener('error', function (e) {
          var t = e && e.target
          if (!t || (t.tagName !== 'SCRIPT' && t.tagName !== 'LINK')) return
          try { if (sessionStorage.getItem('force.healed')) return; sessionStorage.setItem('force.healed', '1') } catch (_) {}
          Promise.resolve()
            .then(function () { return 'serviceWorker' in navigator ? navigator.serviceWorker.getRegistrations() : [] })
            .then(function (rs) { return Promise.all((rs || []).map(function (r) { return r.unregister() })) })
            .then(function () { return 'caches' in window ? caches.keys() : [] })
            .then(function (ks) { return Promise.all((ks || []).map(function (k) { return caches.delete(k) })) })
            .catch(function () {})
            .then(function () { location.reload() })
        }, true) // capture: asset-load errors don't bubble
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
